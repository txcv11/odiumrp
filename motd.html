<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>OdiumRP Reborn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100%; height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
        }

        .bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(140, 0, 0, 0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 0, 0, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(80, 0, 0, 0.2) 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0a 0%, #1a0000 50%, #0a0a0a 100%);
            z-index: 0;
        }

        .grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(180, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(200, 0, 0, 0.6);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .corner-tl, .corner-tr, .corner-bl, .corner-br {
            position: fixed;
            width: 60px; height: 60px;
            z-index: 10;
        }
        .corner-tl { top: 24px; left: 24px; border-top: 2px solid #cc0000; border-left: 2px solid #cc0000; }
        .corner-tr { top: 24px; right: 24px; border-top: 2px solid #cc0000; border-right: 2px solid #cc0000; }
        .corner-bl { bottom: 24px; left: 24px; border-bottom: 2px solid #cc0000; border-left: 2px solid #cc0000; }
        .corner-br { bottom: 24px; right: 24px; border-bottom: 2px solid #cc0000; border-right: 2px solid #cc0000; }

        .content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: #fff;
        }

        .logo {
            font-size: 88px;
            font-weight: 900;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #fff;
            text-shadow:
                0 0 30px rgba(200, 0, 0, 1),
                0 0 60px rgba(200, 0, 0, 0.7),
                0 0 120px rgba(200, 0, 0, 0.4);
            animation: logoPulse 3s ease-in-out infinite;
            line-height: 1;
        }

        .logo span { color: #cc0000; }

        @keyframes logoPulse {
            0%, 100% { text-shadow: 0 0 30px rgba(200,0,0,1), 0 0 60px rgba(200,0,0,0.7), 0 0 120px rgba(200,0,0,0.4); }
            50% { text-shadow: 0 0 40px rgba(255,0,0,1), 0 0 80px rgba(255,0,0,0.9), 0 0 160px rgba(255,0,0,0.6); }
        }

        .tagline {
            margin-top: 14px;
            font-size: 13px;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        .divider {
            width: 300px;
            height: 1px;
            background: linear-gradient(to right, transparent, #cc0000, transparent);
            margin: 32px auto;
            position: relative;
        }

        .divider::before {
            content: '✦';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #cc0000;
            font-size: 12px;
            background: #0a0a0a;
            padding: 0 8px;
        }

        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .loading-text {
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
        }

        .loading-bar {
            width: 280px;
            height: 2px;
            background: rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(to right, transparent, #cc0000, transparent);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .founder {
            position: fixed;
            bottom: 36px;
            right: 80px;
            z-index: 10;
            text-align: right;
        }

        .founder-label {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 4px;
        }

        .founder-name {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #cc0000;
            text-shadow: 0 0 15px rgba(204, 0, 0, 0.6);
        }

        .server-info {
            position: fixed;
            bottom: 36px;
            left: 80px;
            z-index: 10;
            text-align: left;
        }

        .server-info .s-label {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 4px;
        }

        .server-info .s-value {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
        }

        .top-line {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, #cc0000, #ff0000, #cc0000, transparent);
            z-index: 10;
            animation: topGlow 3s ease-in-out infinite;
        }

        @keyframes topGlow {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="top-line"></div>
    <div class="bg"></div>
    <div class="grid"></div>
    <div class="particles" id="particles"></div>

    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <div class="founder">
        <div class="founder-label">Founder</div>
        <div class="founder-name">LU4DEV</div>
    </div>

    <div class="server-info">
        <div class="s-label">Gamemode</div>
        <div class="s-value">FunRP</div>
    </div>

    <div class="content">
        <div class="logo">Odium<span>RP</span></div>
        <div class="tagline">Türkiye'nin En İyi FunRP Deneyimi</div>
        <div class="divider"></div>
        <div class="loading-wrap">
            <div class="loading-text">İlk girişte biraz uzun sürebilir...</div>
            <div class="loading-bar"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (8 + Math.random() * 15) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
            container.appendChild(p);
        }
    </script>

</body>
</html>
