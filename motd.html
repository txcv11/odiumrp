<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>OdiumRP - Hoş Geldin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: #000;
        }

        /* YouTube arka plan */
        #yt-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
        }

        #yt-bg iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 177.78vh;
            height: 56.25vw;
            min-width: 100%;
            min-height: 100%;
        }

        /* Karartma katmanı */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        /* Ana içerik */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: #fff;
        }

        .logo {
            font-size: 72px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #fff;
            text-shadow:
                0 0 20px rgba(180, 0, 0, 0.9),
                0 0 40px rgba(180, 0, 0, 0.6),
                0 0 80px rgba(180, 0, 0, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        .logo span {
            color: #cc0000;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 20px rgba(180,0,0,0.9), 0 0 40px rgba(180,0,0,0.6), 0 0 80px rgba(180,0,0,0.3); }
            50% { text-shadow: 0 0 30px rgba(220,0,0,1), 0 0 60px rgba(220,0,0,0.8), 0 0 120px rgba(220,0,0,0.5); }
        }

        .tagline {
            margin-top: 12px;
            font-size: 16px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
        }

        .divider {
            width: 200px;
            height: 2px;
            background: linear-gradient(to right, transparent, #cc0000, transparent);
            margin: 30px auto;
        }

        .info-box {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .info-item .label {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        .info-item .value {
            font-size: 15px;
            color: rgba(255,255,255,0.85);
            font-weight: 600;
        }

        .enter-btn {
            padding: 14px 60px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #fff;
            background: transparent;
            border: 2px solid #cc0000;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: #cc0000;
            transition: left 0.3s ease;
            z-index: -1;
        }

        .enter-btn:hover::before {
            left: 0;
        }

        .enter-btn:hover {
            box-shadow: 0 0 20px rgba(204, 0, 0, 0.5);
        }

        .corner-tl, .corner-tr, .corner-bl, .corner-br {
            position: fixed;
            width: 40px;
            height: 40px;
            z-index: 3;
        }

        .corner-tl { top: 20px; left: 20px; border-top: 2px solid #cc0000; border-left: 2px solid #cc0000; }
        .corner-tr { top: 20px; right: 20px; border-top: 2px solid #cc0000; border-right: 2px solid #cc0000; }
        .corner-bl { bottom: 20px; left: 20px; border-bottom: 2px solid #cc0000; border-left: 2px solid #cc0000; }
        .corner-br { bottom: 20px; right: 20px; border-bottom: 2px solid #cc0000; border-right: 2px solid #cc0000; }
    </style>
</head>
<body>

    <!-- YouTube Arka Plan -->
    <div id="yt-bg">
        <iframe
            src="https://www.youtube.com/embed/0zCHlh3tHmQ?autoplay=1&mute=0&loop=1&playlist=0zCHlh3tHmQ&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&playsinline=1"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

    <!-- Karartma -->
    <div class="overlay"></div>

    <!-- Köşe süslemeleri -->
    <div class="corner-tl"></div>
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <!-- İçerik -->
    <div class="content">
        <div class="logo">Odium<span>RP</span></div>
        <div class="tagline">Türkiye'nin En İyi DarkRP Deneyimi</div>

        <div class="divider"></div>

        <div class="info-box">
            <div class="info-item">
                <span class="label">Mod</span>
                <span class="value">DarkRP</span>
            </div>
            <div class="info-item">
                <span class="label">Dil</span>
                <span class="value">Türkçe</span>
            </div>
            <div class="info-item">
                <span class="label">Versiyon</span>
                <span class="value">2025</span>
            </div>
        </div>

        <button class="enter-btn" onclick="window.close()">Sunucuya Gir</button>
    </div>

</body>
</html>
